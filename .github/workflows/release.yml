name: Release

on:
  release:
    types: [published]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          mkdir -p $HOME/.xlcore/dalamud/Hooks/dev
          curl -L https://goatcorp.github.io/dalamud-distrib/latest.zip -o /tmp/dalamud.zip
          unzip /tmp/dalamud.zip -d $HOME/.xlcore/dalamud/Hooks/dev

      - name: Build Release
        run: dotnet build HoliestFluffiness/HoliestFluffiness.csproj -c Release

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pack Plugin
        run: |
          mkdir -p dist/HoliestFluffiness/Images
          cp HoliestFluffiness/bin/Release/HoliestFluffiness.dll dist/HoliestFluffiness/
          cp HoliestFluffiness/bin/Release/HoliestFluffiness.pdb dist/HoliestFluffiness/ 2>/dev/null || true
          cp HoliestFluffiness/HoliestFluffiness.json dist/HoliestFluffiness/
          cp HoliestFluffiness/Images/icon.png dist/HoliestFluffiness/Images/

      - name: Generate repo.json
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git show origin/release:repo.json > repo.json 2>/dev/null || true
          python build.py

      - name: Create Zip
        run: |
          cd dist/HoliestFluffiness
          zip -r ../../latest.zip .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: latest.zip

      - name: Push to release branch
        run: |
          cp repo.json /tmp/repo.json
          git fetch origin release:release 2>/dev/null || true
          git checkout release 2>/dev/null || git checkout --orphan release
          git rm -rf . --quiet 2>/dev/null || true
          cp /tmp/repo.json repo.json
          git add repo.json
          git config user.name "GitHub Action"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update repo.json for ${{ github.ref_name }}"
          git push origin release
